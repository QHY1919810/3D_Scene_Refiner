# -----------------------------------------------------------------------------
# FIXED CONFIG: Observed-view supervised + Qwen-Image-Edit rewrite (NO SDS)
#
# Fixes vs previous config:
#   1) tag is no longer derived from the (very long) prompt -> avoids "File name too long"
#   2) prompt / negative_prompt are left EMPTY in YAML; pass them from CLI (recommended),
#      or write them here using YAML block scalars (|-).
# -----------------------------------------------------------------------------

name: "gs-observed-sup-rewrite-qwenedit2511"
tag: "obs_sup_rewrite"   # IMPORTANT: keep short; do NOT derive from prompt
exp_root_dir: "outputs"
seed: 0

# -----------------------------------------------------------------------------
# Data: COLMAP observed views (scene-coordinates TXT model)
# -----------------------------------------------------------------------------
data_type: "colmap-scene-datamodule"
data:
  repo_root: "/nfs4/qhy/projects/threestudio"
  scene_colmap_txt_root: "/nfs4/qhy/projects/threestudio/dataset/camera_transpose_result"

  # GT images / masks
  rgb_root: "/nfs4/qhy/projects/threestudio/dataset/car_images/input"
  mask_root: "/nfs4/qhy/projects/threestudio/dataset/car_images/car_masks"
  use_masks: true

  batch_size: 1
  num_workers: 0
  shuffle: true
  pin_memory: false

  max_items: 0  # 0=all; else first N (sorted by view_id)

# -----------------------------------------------------------------------------
# System
# -----------------------------------------------------------------------------
system_type: "gaussian-splatting-system"
system:

  loss_plot_enable: true
  loss_plot_every_n_steps: 1        # 每 step 画一次
  loss_plot_max_points: 500         # 只画最近 500 个点，避免越来越慢
  loss_plot_path: "/nfs4/qhy/projects/threestudio/test_datas/debugs12/loss_curve.png"                # 空=默认写到 save_debug_dir/loss_curve.png


  save_ply_every_n_steps: 400    # 每 200 step 保存一次（0=关闭） 
  save_ply_overwrite: false      # false=带step快照；true=一直覆盖 point_cloud.ply
  save_ply_dir: ""               # 空=实验 save/ 目录；也可写绝对路径


  enable_sds: false
  enable_sup: false     # REQUIRED by gaussian_splatting_point_routed.py
  enable_rewrite: true

  # Rewrite target settings
  rewrite_update_interval: 10000000000000000


  use_fixed_rewrite_targets: true
  fixed_rewrite_target_dir: "/nfs4/qhy/projects/threestudio/test_datas/rewrite_targets"
  save_fixed_rewrite_targets: true


  rewrite_edit_source: "render"   # "render" (matches qwenmatch sanity) or "gt"
  rewrite_loss_type: "l2"         # "l1" or "l2"
  rewrite_masked: true

  # Debug image dumps (like qwenmatch test)
  save_debug_images: true
  save_debug_interval: 1
  save_debug_include_step: true
  save_debug_dir: "/nfs4/qhy/projects/threestudio/test_datas/debugs12"

  material_type: "gaussian-diffuse-with-point-light-material"

  geometry_type: "gaussian-splatting"
  geometry:
    geometry_convert_from: "/nfs4/qhy/projects/threestudio/dataset/new_combined_scene/scene_plus_car_tagged.ply"
    point_tag_path: "/nfs4/qhy/projects/threestudio/dataset/new_combined_scene/scene_plus_car_tagged.ply.tags.npz"   # REQUIRED: shape [N], 0=bg, 1=car

    position_lr: [0, 0.001, 0.00002, 1000]
    scale_lr: 0.005
    feature_lr: 0.0000000001
    opacity_lr: 0.05
    rotation_lr: 0.005
    # position_lr: [0, 0.000001, 0.000001, 0.000001]
    # scale_lr: 0.000001
    # feature_lr: 0.000001
    # opacity_lr: 0.000001
    # rotation_lr: 0.000001

    densification_interval: 300
    prune_interval: 1000000000     
    opacity_reset_interval: 50000000

    densify_from_iter: 500
    densify_until_iter: ${trainer.max_steps}
    prune_from_iter: 1000000000     
    prune_until_iter: ${trainer.max_steps}

    densify_grad_threshold: 0.01
    min_opac_prune: 0.0
    split_thresh: 0.02
    radii2d_thresh: 1000

    init_num_pts: 4096
    pc_init_radius: 0.8
    opacity_init: 0.2

  # Renderer (keep consistent with your v29/qwenmatch pipeline)
  renderer_type: "diff-gaussian-rasterizer"
  renderer:
    debug: false

  background_type: "gaussian-mvdream-neural-environment-map-background"
  background:
    color_activation: sigmoid
    random_aug: false
    random_aug_prob: 0.0
  # Prompt processor
  # Plain prompt processor: stores prompt strings only (no SD weights).
  prompt_processor_type: "stable-diffusion-prompt-processor"
  prompt_processor:
    pretrained_model_name_or_path: "sd2-community/stable-diffusion-2-1-base"
    prompt: "" 
    negative_prompt: ""

  # Qwen Edit (DiffSynth) – align with your standalone qwenmatch test
  qwen:
    offload_device: "disk"
    onload_device: "cpu"
    onload_dtype: "float8_e4m3fn"
    preparing_device: "cuda"
    preparing_dtype: "float8_e4m3fn"
    computation_device: "cuda"
    computation_dtype: "bfloat16"
    diffsynth_repo_root: "/nfs4/qhy/projects/DiffSynth-Studio"
    models_cache_root: "/nfs4/qhy/projects/DiffSynth-Studio/models/Qwen"

    num_inference_steps: 20
    seed: 1
    zero_cond_t: true
    edit_image_auto_resize: true

    guidance_scale: 4.0
    #denoising_strength: 0.8
    prompt: "严格编辑模式（最小改动原则）：你将收到一张输入图像。请对同一张图进行“清理与融合”式编辑，必须保持构图、镜头视角、透视关系、地平线位置、地形轮廓、车辆与雪山/沙丘的位置与形状完全不变（像素布局不变）。
            你的修改只能是局部修复/去噪/去杂物与轻微光照融合，不得重绘或重新生成整张场景；如果某项修改会导致任何物体形状/位置变化，请宁可不改。
            需要做的编辑（只做这些）:
            1.清理前景与车辆周围杂物/伪影：移除不属于场景的漂浮碎片、绿色条状/块状物、黑色碎屑、异常涂抹、扭曲线条、破碎片、飞散点状杂质；并用连续自然的沙纹无缝修复，保持沙地质感与细节，不要变成平滑塑料。
            2.清理远景噪声：去除天空/雪山/地平线附近的颗粒、斑点、脏污、漂浮噪点、重建残渣；让雪山边缘更干净、层次更自然，但不改变雪山轮廓与位置。
            3.真实感融合（轻微、保守）：保持车辆外观设计细节与颜色完全不变（车灯/车窗/车标/轮毂等都不改），仅做轻微光照一致性调整：让车体高光方向、阴影强度与接地阴影更贴合环境（沙漠散射光 + 远处雪山冷色环境光），让轮胎接触更合理。
            严格禁止:
            1.禁止重新生成/重绘整张图，禁止改变构图/镜头/视角/透视/地平线
            2.禁止移动、替换、改变车辆/雪山/沙丘的形状与位置
            3.禁止新增任何物体（人/动物/建筑/植被/云/文字/水印/logo）
            4.禁止产生新的伪影（涂抹块、拉丝、重影、变形、过度磨皮、过度锐化）"
    negative_prompt: "re-render, redraw, new scene, different camera angle, different perspective, changed horizon, moved car, changed car shape, different car model, extra objects, people, animals, buildings, plants, clouds, text, watermark, logo, oversmooth, plastic sand, heavy blur, painterly, cartoon, stylized, smear, glitch, artifacts, double image, ghosting, distortion."
     # pass from CLI (recommended)

  loss:
    # Strict point-routed training: shared/global losses must be disabled.
    lambda_rgb: 0.0
    lambda_silhouette: 0.0

    lambda_rewrite: 0.1
    lambda_hf: 0.1

    lambda_position: 0.0
    lambda_opacity: 0.0
    lambda_scales: 0.0
    lambda_tv_loss: 0.0
    lambda_depth_tv_loss: 0.0
  hf_mode: "laplacian"    # 或 "sobel"
  hf_loss_type: "l1"      # 或 "l2"
  hf_grayscale: true
  hf_mask_dilate: 2       # 可选：让边界更稳（0=不膨胀）

  optimizer:
    name: Adam
    args:
      #lr: 0.01
      lr: 0
      betas: [0.9, 0.99]
      eps: 1.e-15
    params:
      background:
        #lr: 0.001
        lr: 0

trainer:
  max_steps: 5000
  log_every_n_steps: 1
  num_sanity_val_steps: 0
  val_check_interval: 1
  enable_progress_bar: true
  precision: 32-true

checkpoint:
  save_last: true
  save_top_k: -1
  every_n_train_steps: ${trainer.max_steps}
